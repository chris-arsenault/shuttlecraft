services:
  backend:
    image: ghcr.io/chris-arsenault/shuttlecraft/backend:${IMAGE_TAG}
    container_name: shuttlecraft-backend
    restart: unless-stopped
    environment:
      SHUTTLECRAFT_DB_URL: "postgres://shuttlecraft:${DB_PASSWORD}@postgres:5432/shuttlecraft"
      SHUTTLECRAFT_LISTEN: "0.0.0.0:8080"
      SHUTTLECRAFT_REPOS_ROOT: "/home/dev/repos"
      SHUTTLECRAFT_CLAUDE_PROJECTS: "/home/dev/.claude/projects"
      SHUTTLECRAFT_CORRELATE_SOCK: "/run/shuttlecraft/correlate.sock"
      HOME: "/home/dev"
    volumes:
      - /tank/dev/shuttlecraft/home:/home/dev
      - /tank/dev/shuttlecraft/repos:/home/dev/repos
      - shuttlecraft_run:/run/shuttlecraft
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    image: ghcr.io/chris-arsenault/shuttlecraft/frontend:${IMAGE_TAG}
    container_name: shuttlecraft-frontend
    restart: unless-stopped
    ports:
      - "192.168.66.3:30080:80"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: shuttlecraft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shuttlecraft
      POSTGRES_USER: shuttlecraft
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - /tank/dev/shuttlecraft/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shuttlecraft -d shuttlecraft"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  shuttlecraft_run:
