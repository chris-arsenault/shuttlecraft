name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read
  packages: write

jobs:
  ci:
    uses: chris-arsenault/ahara/.github/workflows/ci.yml@main
    secrets: inherit

  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: shuttlecraft
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shuttlecraft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Run backend integration tests
        env:
          SHUTTLECRAFT_TEST_DB: postgres://postgres:testpass@127.0.0.1:55432/shuttlecraft
        run: make test-rust-integration
